# GitLab CI/CD Pipeline for New-API

variables:
  DOCKER_REGISTRY: $CI_REGISTRY
  IMAGE_NAME: $CI_REGISTRY_IMAGE
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: ""

stages:
  - lint
  - test
  - build
  - security
  - deploy

# ========== 代码检查 ==========
lint:go:
  stage: lint
  image: golang:1.22-alpine
  before_script:
    - apk add --no-cache git
    - go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
  script:
    - golangci-lint run --timeout=5m
  only:
    - merge_requests
    - main
    - develop

lint:frontend:
  stage: lint
  image: oven/bun:latest
  script:
    - cd web && bun install
    - bun run lint || true
  only:
    - merge_requests
    - main
    - develop

# ========== 单元测试 ==========
test:go:
  stage: test
  image: golang:1.22-alpine
  services:
    - mysql:8.0
    - redis:7-alpine
  variables:
    MYSQL_ROOT_PASSWORD: test
    MYSQL_DATABASE: new_api_test
  script:
    - go test -v -race -coverprofile=coverage.out ./...
    - go tool cover -func=coverage.out
  coverage: '/total:\s*\d+\.\d+%/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.out
    paths:
      - coverage.out
  only:
    - merge_requests
    - main
    - develop

# ========== 构建镜像 ==========
build:image:
  stage: build
  image: docker:24-dind
  services:
    - docker:24-dind
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - |
      if [ "$CI_COMMIT_BRANCH" == "main" ]; then
        TAG="stable"
      elif [ "$CI_COMMIT_BRANCH" == "develop" ]; then
        TAG="latest"
      else
        TAG=$CI_COMMIT_SHORT_SHA
      fi
    - docker build -t $IMAGE_NAME:$TAG .
    - docker push $IMAGE_NAME:$TAG
    - docker tag $IMAGE_NAME:$TAG $IMAGE_NAME:$CI_COMMIT_SHORT_SHA
    - docker push $IMAGE_NAME:$CI_COMMIT_SHORT_SHA
  only:
    - main
    - develop

# ========== 安全扫描 ==========
security:trivy:
  stage: security
  image: aquasec/trivy:latest
  script:
    - trivy image --exit-code 0 --no-progress $IMAGE_NAME:$CI_COMMIT_SHORT_SHA
  allow_failure: true
  only:
    - main
    - develop

# ========== 部署到开发环境 ==========
deploy:dev:
  stage: deploy
  image: bitnami/kubectl:1.28
  environment:
    name: development
    url: http://dev.new-api.example.com
  before_script:
    - kubectl config use-context $KUBE_CONTEXT_DEV
  script:
    - cd deploy/aliyun/environments/dev
    - sed -i "s|image: calciumion/new-api:.*|image: $IMAGE_NAME:$CI_COMMIT_SHORT_SHA|" 04-deployment.yaml
    - kubectl apply -f 01-namespace.yaml
    - kubectl apply -f 02-configmap.yaml
    - kubectl apply -f 03-secret.yaml
    - kubectl apply -f 04-deployment.yaml
    - kubectl apply -f 05-service.yaml
    - kubectl apply -f 06-hpa.yaml
    - kubectl rollout status deployment/new-api -n new-api-dev --timeout=300s
  only:
    - develop

# ========== 部署到预发环境 ==========
deploy:staging:
  stage: deploy
  image: bitnami/kubectl:1.28
  environment:
    name: staging
    url: http://staging.new-api.example.com
  before_script:
    - kubectl config use-context $KUBE_CONTEXT_STAGING
  script:
    - cd deploy/aliyun/environments/staging
    - sed -i "s|image: calciumion/new-api:.*|image: $IMAGE_NAME:$CI_COMMIT_SHORT_SHA|" 04-deployment.yaml
    - kubectl apply -f 01-namespace.yaml
    - kubectl apply -f 02-configmap.yaml
    - kubectl apply -f 03-secret.yaml
    - kubectl apply -f 04-deployment.yaml
    - kubectl apply -f 05-service.yaml
    - kubectl apply -f 06-hpa.yaml
    - kubectl rollout status deployment/new-api -n new-api-staging --timeout=300s
    - |
      STAGING_URL=$(kubectl get svc new-api-service -n new-api-staging -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
      curl -f http://${STAGING_URL}/api/status || exit 1
  only:
    - main

# ========== 部署到生产环境 ==========
deploy:production:
  stage: deploy
  image: bitnami/kubectl:1.28
  environment:
    name: production
    url: http://new-api.example.com
  before_script:
    - kubectl config use-context $KUBE_CONTEXT_PROD
  script:
    - cd deploy/aliyun/environments/production
    - |
      # 使用 Git Tag 作为版本号
      VERSION=${CI_COMMIT_TAG#v}
      sed -i "s|image: calciumion/new-api:.*|image: $IMAGE_NAME:$VERSION|" 04-deployment.yaml
    - kubectl apply -f 01-namespace.yaml
    - kubectl apply -f 02-configmap.yaml
    - kubectl apply -f 03-secret.yaml
    - kubectl apply -f 04-deployment.yaml
    - kubectl apply -f 05-service.yaml
    - kubectl apply -f 06-hpa.yaml
    - kubectl apply -f 07-pdb.yaml
    - kubectl rollout status deployment/new-api -n new-api-prod --timeout=600s
  when: manual
  only:
    - tags
